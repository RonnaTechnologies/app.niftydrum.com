    <script>
      Number.prototype.clamp = function (min, max) 
      {
        return Math.min(Math.max(this, min), max);
      };
      var width = 256;
      var height = 256;

      function drag_constrained(pos)
      {
        return {
          x: this.absolutePosition().x,
          y: pos.y.clamp(0, 256),
        };
      }

      function drag(pos)
      {
        return {
          x: pos.x.clamp(0, 256),
          y: pos.y.clamp(0, 256),
        };
      }
      // function to build anchor point
      function buildAnchor(x, y, constrained = false) 
      {

        const settings =
        {
          x: x,
          y: y,
          radius: 12,
          stroke: '#666',
          fill: '#ddd',
          strokeWidth: 2,
          draggable: true,
          dragBoundFunc: drag
        };
        if (constrained)
        {
          settings['dragBoundFunc'] = drag_constrained
        }
        var anchor = new Konva.Circle(settings);
        layer.add(anchor);

        // add hover styling
        anchor.on('mouseover', function ()
        {
          document.body.style.cursor = 'pointer';
          this.strokeWidth(4);
        });

        anchor.on('mouseout', function () 
        {
          document.body.style.cursor = 'default';
          this.strokeWidth(2);
        });

        anchor.on('dragmove', function () 
        {
          updateDottedLines();
        });

        return anchor;
      }

      var stage = new Konva.Stage(
        {
          container: 'container',
          width: width,
          height: height,
        });

      var layer = new Konva.Layer();
      stage.add(layer);

      // function to update line points from anchors
      function updateDottedLines() 
      {
        var b = bezier;

        var bezierLinePath = layer.findOne('#bezierLinePath');


        bezierLinePath.points(
          [
            b.start.x(),
            b.start.y(),
            b.control1.x(),
            b.control1.y(),
            b.control2.x(),
            b.control2.y(),
            b.end.x(),
            b.end.y(),
          ]);
      }


      // we will use custom shape for curve
      var bezierLine = new Konva.Shape(
        {
          stroke: 'orange',
          strokeWidth: 5,
          sceneFunc: (ctx, shape) => 
          {
            ctx.beginPath();
            ctx.moveTo(bezier.start.x(), bezier.start.y());
            ctx.bezierCurveTo(
              bezier.control1.x(),
              bezier.control1.y(),
              bezier.control2.x(),
              bezier.control2.y(),
              bezier.end.x(),
              bezier.end.y()
            );
            ctx.fillStrokeShape(shape);
          },
        });
      layer.add(bezierLine);



      var bezierLinePath = new Konva.Line(
        {
          dash: [10, 0, 0, 10],
          strokeWidth: 3,
          stroke: 'gray',
          lineCap: 'round',
          id: 'bezierLinePath',
          opacity: 0.3,
          points: [0, 0],
        });
      layer.add(bezierLinePath);


      var bezier =
      {
        start: buildAnchor(0, 256, true),
        control1: buildAnchor(64, 192),
        control2: buildAnchor(192, 128),
        end: buildAnchor(256, 0, true),
      };

      updateDottedLines();

      function export_curve()
      {
        const P0_x = bezier.start.attrs.x;
        const P0_y = bezier.start.attrs.y;
        const P1_x = bezier.control1.attrs.x;
        const P1_y = bezier.control1.attrs.y;
        const P2_x = bezier.control2.attrs.x;
        const P2_y = bezier.control2.attrs.y;
        const P3_x = bezier.end.attrs.x;
        const P3_y = bezier.end.attrs.y;
        const N = 2048
        const bx = new Array(N)
        const by = new Array(N)
        const data = new Array(N)

        for (let i = 0; i < by.length; ++i)
        {
          const t = i / by.length
          bx[i] = Math.pow(1 - t, 3) * P0_x + 3 * Math.pow(1 - t, 2) * t * P1_x + 3 * (1 - t) * Math.pow(t, 2) * P2_x + Math.pow(t, 3) * P3_x
          by[i] = P0_y - (Math.pow(1 - t, 3) * P0_y + 3 * Math.pow(1 - t, 2) * t * P1_y + 3 * (1 - t) * Math.pow(t, 2) * P2_y + Math.pow(t, 3) * P3_y)
          data[i] = [bx[i], by[i]]
        }

        const y = new Array(256);

        for (let x = 0; x < y.length; ++x)
        {
          const d = [...bx].map(v => Math.abs(v - x))
          const i = d.indexOf(Math.min(...d))
          y[x] = Math.round(by[i])
        }

        console.log(y)

        const replacer = (key, value) =>
          value instanceof Object && !(value instanceof Array) ?
            Object.keys(value)
              .sort()
              .reverse()
              .reduce((sorted, key) => 
              {
                sorted[key] = value[key];
                return sorted
              }, {}) :
            value;

        const out_obj = { points: [[P0_x, P0_y], [P1_x, P1_y], [P2_x, P2_y], [P3_x, P3_y]], data: [] }
        console.log(JSON.stringify(out_obj, replacer))
      }
    </script>
