      ev.onmessage = function (e)

      async function upload_firmware()
      {
        document.getElementById('fw_upload_button').ariaBusy = true
        const firmware_file = document.getElementById("firmware_file").files[0]
        const formData = new FormData();

        formData.append('firmware_file', firmware_file);

        const resp = await fetch('/firmware', { // Your POST endpoint
          method: 'POST',
          body: formData // This is your file object
        })
        const j = await resp.json() // if the response is a JSON object
        console.log(j)

        document.getElementById('fw_upload_button').ariaBusy = false

      }

    <script>

      Number.prototype.clamp = function (min, max) 
      {
        return Math.min(Math.max(this, min), max);
      };

      var stage = new Konva.Stage(
        {
          container: 'curve_container',
          width: 512,
          height: 512,
        });

      function drag_constrained(pos)
      {
        return {
          x: this.absolutePosition().x,
          y: pos.y.clamp(0, stage.height()),
        };
      }

      function drag(pos)
      {
        return {
          x: pos.x.clamp(0, stage.width()),
          y: pos.y.clamp(0, stage.height()),
        };
      }
      // function to build anchor point
      function buildAnchor(x, y, constrained = false) 
      {

        const settings =
        {
          x: x,
          y: y,
          radius: 12,
          stroke: '#666',
          fill: '#ddd',
          strokeWidth: 2,
          draggable: true,
          dragBoundFunc: drag
        };
        if (constrained)
        {
          settings['dragBoundFunc'] = drag_constrained
        }
        var anchor = new Konva.Circle(settings);
        layer.add(anchor);

        // add hover styling
        anchor.on('mouseover', function ()
        {
          document.body.style.cursor = 'pointer';
          this.strokeWidth(4);
        });

        anchor.on('mouseout', function () 
        {
          document.body.style.cursor = 'default';
          this.strokeWidth(2);
        });

        anchor.on('dragmove', function () 
        {
          updateDottedLines();
        });

        return anchor;
      }


      var layer = new Konva.Layer();
      stage.add(layer);

      // function to update line points from anchors
      function updateDottedLines() 
      {
        var b = bezier;

        var bezierLinePath = layer.findOne('#bezierLinePath');


        bezierLinePath.points(
          [
            b.start.x(),
            b.start.y(),
            b.control1.x(),
            b.control1.y(),
            b.control2.x(),
            b.control2.y(),
            b.end.x(),
            b.end.y(),
          ]);
      }


      // we will use custom shape for curve
      var bezierLine = new Konva.Shape(
        {
          stroke: 'orange',
          strokeWidth: 5,
          sceneFunc: (ctx, shape) => 
          {
            ctx.beginPath();
            ctx.moveTo(bezier.start.x(), bezier.start.y());
            ctx.bezierCurveTo(
              bezier.control1.x(),
              bezier.control1.y(),
              bezier.control2.x(),
              bezier.control2.y(),
              bezier.end.x(),
              bezier.end.y()
            );
            ctx.fillStrokeShape(shape);
          },
        });
      layer.add(bezierLine);



      var bezierLinePath = new Konva.Line(
        {
          dash: [10, 0, 0, 10],
          strokeWidth: 3,
          stroke: 'gray',
          lineCap: 'round',
          id: 'bezierLinePath',
          opacity: 0.3,
          points: [0, 0],
        });
      layer.add(bezierLinePath);

      console.log(stage.height)
      var bezier =
      {
        start: buildAnchor(0, stage.height(), true),
        control1: buildAnchor(stage.width() / 4, 3 * stage.height() / 4),
        control2: buildAnchor(3 * stage.width() / 4, stage.height() / 2),
        end: buildAnchor(stage.width(), 0, true),
      };

      updateDottedLines();

      // Function to make the stage responsive
      function fitStageIntoParentContainer()
      {
        // Get the container element
        const container = document.getElementById('curve_container');

        // Make the container take up the full width
        container.style.width = '100%';

        // Get current container width
        const containerWidth = container.offsetWidth;

        // Calculate scale based on virtual width vs actual width
        const scale = containerWidth / 512;

        // Set stage dimensions and scale
        stage.width(512 * scale);
        stage.height(512 * scale);
        stage.scale({ x: scale, y: scale });
      }

      // Initial fit
      fitStageIntoParentContainer();

      // Adapt the stage on window resize
      window.addEventListener('resize', fitStageIntoParentContainer);


    </script>
