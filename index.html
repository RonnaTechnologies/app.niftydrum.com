<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <!-- <link rel="manifest" href="/site.webmanifest"> -->
  <link rel="stylesheet" href="/assets/css/pico.pumpkin.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">

  <script src="/assets/js/konva.min.js" defer></script>
  <script src="/assets/js/bezier-curves.js" defer></script>
  <script src="/assets/js/vertical-gauge.js" defer></script>
  <script src="/assets/js/times-control.js" defer></script>
  <script src="/assets/js/script.js" defer></script>
  <script src="/assets/js/firmeware.js" defer></script>

  <title>NiftyDrum App</title>
</head>

<body style="min-width: 90vw;" class="container-fluid">
  <header>
    <center>
      <h1>NiftyDrum</h1>
      <small>by Ronna Technologies</small>
    </center>

    <button class="secondary">
      infos
    </button>

    <nav role="group">
      <select name="sensors" id="sensors-select">
        <option value="Hi-hat Controller" selected>Hi-hat Controller</option>
        <option value="Hi-hat">Hi-hat</option>
        <option value="Kick">Kick</option>
        <option value="Snare">Snare</option>
        <option value="Crash 1">Crash 1</option>
        <option value="Tom 1">Tom 1</option>
        <option value="Tom 3">Tom 3</option>
        <option value="Ride">Ride</option>
        <option value="Tom 2">Tom 2</option>
        <option value="Crash 2">Crash 2</option>
      </select>

      <button class="secondary">Preferences</button>
    </nav>

    <button>Save</button>
  </header>

  <main>
    <section>
      Velocity curve
      <bezier-curve></bezier-curve>
    </section>

    <section>
      <div>Gain</div>
      <vertical-gauge value="20">
        <div class="gauge-container">
          <div class="threshold-marker">
            <span class="threshold-label">50%</span>
          </div>
        </div>
      </vertical-gauge>
    </section>

    <section>
      Parameters
      <times-control></times-control>
    </section>
  </main>

  <dialog id="about-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev" data-target="about-modal"></button>
        <strong>About NiftyDrum App</strong>
      </header>
      <p>
        NiftyDrum App is a <a href="https://ronnatech.com" target="_blank">Ronna Technologies</a> product.
      </p>
    </article>
  </dialog>

</body>

</html>
