<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <!-- <link rel="manifest" href="/site.webmanifest"> -->
  <link rel="stylesheet" href="/assets/css/pico.pumpkin.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">

  <script src="/assets/js/utils.js" defer></script>
  <script src="/assets/js/bezier-curves.js" defer></script>
  <script src="/assets/js/vertical-gauge.js" defer></script>
  <script src="/assets/js/times-control.js" defer></script>
  <script src="/assets/js/script.js" defer></script>
  <script src="/assets/js/firmeware.js" defer></script>

  <title>NiftyDrum App</title>
</head>

<body style="min-width: 90vw;" class="container-fluid">
  <header>
    <center>
      <h1>NiftyDrum</h1>
      <small>by Ronna Technologies</small>
    </center>

    <button class="secondary">
      Params
    </button>

    <select name="sensors" id="sensors-select">
      <option value="kick" selected>Kick</option>
      <option value="snare">Snare</option>
      <option value="ride">Ride</option>
      <option value="crash1">Crash 1</option>
      <option value="crash2">Crash 2</option>
      <option value="tom1">Tom 1</option>
      <option value="tom2">Tom 2</option>
      <option value="tom3">Tom 3</option>
      <option value="hihat">Hi-hat</option>
      <option value="hhc">Hi-hat Controller</option>
    </select>

    <button class="secondary" onclick="confirm('All presets will be reset to last configuration')">Reset</button>
    <button onclick="confirm('Previous configuration will be replaced by the current presets')">Save</button>
  </header>

  <main>
    <div id="default-mode">
      <section>
        Note
        <input type="number" name="midi-note" min="0" max="256" id="midi-note" value="0">


        Velocity curve
        <bezier-curve>
          <svg id="bezier-svg" viewBox="0 -10 256 276" width="256" height="256">
            <line id="line-p0-p1" class="control-line" x1="0" y1="128" x2="64" y2="64"></line>
            <line id="line-p2-p3" class="control-line" x1="192" y1="192" x2="255" y2="128"></line>
  
            <path id="bezier-curve-path" d="M 0,128 C 64,64 192,192 255,128" />
  
            <circle class="bezier-anchor" id="p0" cx="0" cy="128" r="6"></circle>
            <circle class="bezier-anchor" id="p1" cx="64" cy="64" r="6"></circle>
            <circle class="bezier-anchor" id="p2" cx="192" cy="192" r="6"></circle>
            <circle class="bezier-anchor" id="p3" cx="255" cy="128" r="6"></circle>
          </svg>
        </bezier-curve>
      </section>
  
      <section>
        Gain
        <vertical-gauge max="100">
          <div class="gauge-container">
            <div class="marker">
              <span class="label">0%</span>
            </div>
          </div>
        </vertical-gauge>
      </section>
  
      <section style="flex-grow: 1">
        Times controls
        <times-control hmin="0" hmax="2000" vmin="1" vmax="1000"
          scan="10,500,10,200,#f0f" mask="10,500,10,300,#0ff" decay="10,500,10,400,#00f"></times-control>
      </section>
    </div>
    <div id="hhc-mode" disabled>
      hhc mode
    </div>
  </main>

  <dialog id="about-modal">
    <article>
      <header>
        <button aria-label="Close" rel="prev" data-target="about-modal"></button>
        <strong>About NiftyDrum App</strong>
      </header>
      <p>
        NiftyDrum App is a <a href="https://ronnatech.com" target="_blank">Ronna Technologies</a> product.
      </p>
    </article>
  </dialog>

</body>

</html>
